name: scrape-and-update

on:
  schedule:
    # GitHub Actions cron uses UTC. 04:00 UTC = 12:00 Beijing time.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daliy_update_waterlevel.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Yangtze water-level data"
          git push
